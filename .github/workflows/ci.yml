name: Fitness Tracker CI Pipeline
on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
jobs:
  code-quality:
    name: SonarQube Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: http://18.220.50.41:9000
      - name: SonarQube Quality Gate Check
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: http://18.220.50.41:9000
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Tests
        run: |
          pip install pytest
          pytest --tb=short || true
      - name: Build Artifact
        run: |
          echo "Build successful - $(date)" > build-info.txt
          cat build-info.txt
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: fitness-tracker-artifact
          path: build-info.txt
  docker-gate:
    name: Docker Build Gate
    runs-on: ubuntu-latest
    needs: [code-quality, build]
    steps:
      - name: Quality Gate Passed
        run: echo "SonarQube Quality Gate passed - Ready for Docker build"
