name: Fitness Tracker CI Pipeline
on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  code-quality:
    name: SonarQube Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: http://18.220.50.41:9000
      - name: SonarQube Quality Gate Check
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: http://18.220.50.41:9000

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install Dependencies
        run: npm install
      - name: Run Tests
        run: npm test || true
      - name: Build Artifact
        run: |
          echo "Build successful - $(date)" > build-info.txt
          cat build-info.txt
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fitness-tracker-artifact
          path: build-info.txt

  docker-build:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs: [code-quality, build]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fitness-tracker-dev:latest .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fitness-tracker-dev:${{ github.sha }} .
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/fitness-tracker-dev:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/fitness-tracker-dev:${{ github.sha }}
      - name: Promotion Ready
        run: echo "Docker image pushed - Ready for promotion to prod"
