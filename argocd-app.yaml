apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fitness-tracker
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Inderpreet26/Fitness_Tracker
    targetRevision: master
    path: Fitness_Chart
    helm:
      valueFiles:
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
